# Sledované outdoorové značky z repozitáře
#
# Strategie exa: Exa.ai vyhledává novinky na webech výrobců.
# Kategorie se určuje AUTOMATICKY podle obsahu (titulku, URL, textu).
# Konfigurační "category" slouží jen jako fallback, když detekce selže.
#
# Tip: Pokud vám docházejí Exa kredity, snižte exa_num_results nebo
# zakomentujte méně zajímavé značky.

# ========================== BATOHY / VÝBAVA ==========================

