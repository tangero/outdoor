# Sledovaní výrobci outdoorového vybavení podle značek v repozitáři
#
# Strategie:
#   exa    - Exa.ai API vyhledávání (vyžaduje EXA_API_KEY v GitHub Secrets)
#
# Tip: Pokud vám docházejí kredity na Exa.ai, snižte exa_num_results na 1-2
# nebo sledujte jen vybrané značky.

# =========================== BATOHY ===========================

- name: "Bach"
  category: "batohy"
  strategy: "exa"
  exa_query: "Bach new backpack product launch"
  exa_domains: ["bachpacks.com"]
