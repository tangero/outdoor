# Konfigurace sledovaných zdrojů outdoorových výrobců
#
# Podporované strategie:
#   rss      - čte RSS/Atom feed (potřebuje rss_url)
#   sitemap  - čte XML sitemapu (potřebuje sitemap_url)
#   scrape   - scrapuje HTML stránku (potřebuje list_url + selektory)
#
# Pro každý zdroj se automaticky generují drafty do _drafts/ při detekci novinky.
#
# Jak najít RSS výrobce:
#   1. Zkuste [doména]/feed/ nebo [doména]/blog/feed/
#   2. Pro Shopify weby: [doména]/blogs/news.atom
#   3. Podívejte se do <head> stránky na <link rel="alternate" type="application/rss+xml">
#   4. Použijte online nástroj jako https://www.rssground.com/find-rss-feed.html

# --- Fungující RSS příklady ---

- name: "Zpacks News"
  category: "batohy"
  strategy: "rss"
  rss_url: "https://zpacks.com/blogs/news.atom"
  # Zpacks vyrábí ultralehké batohy a vybavení, často přidávají nové produkty

- name: "Patagonia Blog"
  category: "ostatni"
  strategy: "rss"
  rss_url: "https://www.patagonia.com/blog/feed/"
  # Patagonia blog - příběhy, nové produkty, environmentální aktivity

- name: "Arc'teryx Blog"
  category: "ostatni"
  strategy: "rss"
  rss_url: "https://blog.arcteryx.com/feed/"
  # Arc'teryx blog - novinky o vybavení a outdoor aktivitách

